<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ポケモンチャンピオンズ すばやさ・パーティ比較</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">

<!-- ポケモン検索モーダル -->
<div id="modal" class="fixed inset-0 bg-black/60 z-50 p-4"
  style="display:none; align-items:center; justify-content:center;">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden flex flex-col"
    style="max-height:90vh;">
    <div class="p-4 border-b flex justify-between items-center bg-gray-50 shrink-0">
      <h3 class="font-bold">ポケモンを選択</h3>
      <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600">✕</button>
    </div>
    
    <!-- タブボタン -->
    <div class="flex border-b text-xs font-bold shrink-0">
      <button id="tab-btn-single" onclick="setModalTab('single')" class="flex-1 py-3 border-b-2 transition">シングルバトル</button>
      <button id="tab-btn-double" onclick="setModalTab('double')" class="flex-1 py-3 border-b-2 transition">ダブルバトル</button>
      <button id="tab-btn-search" onclick="setModalTab('search')" class="flex-1 py-3 border-b-2 transition">検索結果</button>
    </div>

    <div class="p-4 overflow-y-auto flex-1">
      <div class="sticky top-0 bg-white pb-2 z-10">
        <input id="modal-search" type="text" placeholder="名前・番号で検索..."
          class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
          autocomplete="off">
      </div>

      <!-- シングルタブ -->
      <div id="tab-pane-single" class="hidden">
        <div id="quick-list-single" class="grid grid-cols-3 gap-2"></div>
      </div>
      
      <!-- ダブルタブ -->
      <div id="tab-pane-double" class="hidden">
        <div id="quick-list-double" class="grid grid-cols-3 gap-2"></div>
      </div>

      <!-- 検索結果タブ -->
      <div id="tab-pane-search" class="hidden">
        <div id="modal-results" class="flex flex-wrap gap-1 p-1"></div>
      </div>
    </div>

    <div class="p-4 border-t bg-gray-50 flex gap-3 shrink-0">
      <button onclick="clearSlot()"
        class="flex-1 py-2 rounded-lg border border-red-300 text-red-500 text-xs hover:bg-red-50">
        スロットをクリア
      </button>
      <button onclick="closeModal()"
        class="flex-1 py-2 rounded-lg border text-gray-600 text-xs hover:bg-gray-50">
        キャンセル
      </button>
    </div>
  </div>
</div>

<header class="bg-white shadow-sm py-4 mb-6">
  <h1 class="text-2xl font-bold text-center text-gray-800">ポケモンチャンピオンズ すばやさ・パーティ比較</h1>
  <p class="text-center text-gray-400 text-sm mt-1">Lv50固定 / 個体値31固定 / PokéAPI使用</p>
</header>

<main class="max-w-6xl mx-auto px-4 pb-16">

  <!-- ⚡ すばやさランキング（最上部・メイン） -->
  <div class="bg-white rounded-2xl shadow-md p-6 mb-6">
    <div class="flex items-center justify-between mb-1">
      <h2 class="text-xl font-bold text-gray-800 flex items-center gap-2">
        ⚡ すばやさランキング
      </h2>
      <div class="flex gap-3 text-xs">
        <span class="px-2 py-1 bg-blue-100 text-blue-600 rounded-full font-bold">■ 自分</span>
        <span class="px-2 py-1 bg-red-100 text-red-600 rounded-full font-bold">■ 相手</span>
      </div>
    </div>
    <p class="text-sm text-gray-400 mb-5">速い順・最大12体表示</p>
    
    <!-- 🆕 数直線タイムライン -->
    <div id="speed-timeline-container" class="relative bg-gray-50 rounded-xl border border-gray-100 p-4 mb-6 min-h-[220px] overflow-x-auto overflow-y-hidden">
      <div id="speed-timeline-axis" class="absolute left-6 right-6 h-0.5 bg-gray-300 top-1/2 -translate-y-1/2">
        <!-- 目盛りなどはJSで生成 -->
      </div>
      <div id="speed-timeline-pins" class="absolute left-6 right-6 top-1/2 h-0">
        <!-- ポケモンアイコンがここに並ぶ -->
      </div>
      <div id="speed-timeline-labels" class="absolute left-6 right-6 bottom-2 flex justify-between text-[10px] text-gray-400 font-mono">
        <!-- 数値ラベル -->
      </div>
    </div>

    <div id="speed-ranking">
      <p class="text-gray-400 text-center py-10">パーティにポケモンを登録してください</p>
    </div>
  </div>

  <!-- 自分のパーティ選択タブ -->
  <div class="bg-white rounded-2xl shadow-md px-5 py-4 mb-4">
    <p class="text-xs text-gray-400 mb-2 font-bold uppercase tracking-wider">自分のパーティ選択</p>
    <div id="my-party-tabs" class="flex gap-2 flex-wrap"></div>
  </div>

  <!-- パーティスロット -->
  <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">

    <!-- 自分のパーティ -->
    <div class="bg-white rounded-2xl shadow-md overflow-hidden">
      <div class="bg-blue-500 text-white px-5 py-3 flex items-center gap-2">
        <span class="font-bold">自分のパーティ</span>
        <span id="my-party-label" class="text-blue-100 text-sm font-normal"></span>
      </div>
      <div class="p-5">
        <div id="my-slots" class="grid grid-cols-3 gap-3"></div>
        <div id="my-config" class="hidden mt-4"></div>
      </div>
    </div>

    <!-- 相手のパーティ -->
    <div class="bg-white rounded-2xl shadow-md overflow-hidden">
      <div class="bg-red-500 text-white px-5 py-3">
        <span class="font-bold">相手のパーティ</span>
      </div>
      <div class="p-5">
        <div id="opp-slots" class="grid grid-cols-3 gap-3"></div>
        <div id="opp-config" class="hidden mt-4"></div>
      </div>
    </div>
  </div>

</main>

<script>
  // ===== 定数 =====
  const STAT_KEYS   = ['hp','atk','def','spa','spd','spe'];
  const STAT_LABELS = { hp:'HP', atk:'こうげき', def:'ぼうぎょ', spa:'とくこう', spd:'とくぼう', spe:'すばやさ' };
  // チャンピオンズ固定値
  const FIXED_LV = 50;
  const FIXED_IV = 31;
  // 能力ポイント制限
  const AP_MAX_SINGLE = 32;
  const AP_MAX_TOTAL  = 66;

  const NATURES = [
    { name:'まじめ',     plus:null,  minus:null  },
    { name:'がんばりや', plus:null,  minus:null  },
    { name:'すなお',     plus:null,  minus:null  },
    { name:'てれや',     plus:null,  minus:null  },
    { name:'きまぐれ',   plus:null,  minus:null  },
    { name:'さみしがり', plus:'atk', minus:'def' },
    { name:'いじっぱり', plus:'atk', minus:'spa' },
    { name:'やんちゃ',   plus:'atk', minus:'spd' },
    { name:'ゆうかん',   plus:'atk', minus:'spe' },
    { name:'ずぶとい',   plus:'def', minus:'atk' },
    { name:'わんぱく',   plus:'def', minus:'spa' },
    { name:'のうてんき', plus:'def', minus:'spd' },
    { name:'のんき',     plus:'def', minus:'spe' },
    { name:'ひかえめ',   plus:'spa', minus:'atk' },
    { name:'おっとり',   plus:'spa', minus:'def' },
    { name:'うっかりや', plus:'spa', minus:'spd' },
    { name:'れいせい',   plus:'spa', minus:'spe' },
    { name:'おだやか',   plus:'spd', minus:'atk' },
    { name:'おとなしい', plus:'spd', minus:'def' },
    { name:'しんちょう', plus:'spd', minus:'spa' },
    { name:'なまいき',   plus:'spd', minus:'spe' },
    { name:'おくびょう', plus:'spe', minus:'atk' },
    { name:'せっかち',   plus:'spe', minus:'def' },
    { name:'ようき',     plus:'spe', minus:'spa' },
    { name:'むじゃき',   plus:'spe', minus:'spd' },
  ];

  // ===== データ構造 =====
  // aps = 能力ポイント（旧:努力値）
  const emptySlot  = () => ({
    pokemon: null,
    nature: 'まじめ',
    aps: { hp:0, atk:0, def:0, spa:0, spd:0, spe:0 },
    speMod: 1.0,
    manualSpe: null
  });
  const emptyParty = () => Array.from({length:6}, emptySlot);

  // よくあるポケモン定義
  const COMMON_SINGLE = [
    { name: 'ガブリアス', id: 'garchomp' },
    { name: 'メガリザードンY', id: 'charizard-mega-y' },
    { name: 'アシレーヌ', id: 'primarina' },
    { name: 'ブリジュラス', id: 'archaludon' },
    { name: 'カバルドン', id: 'hippowdon' },
    { name: 'アーマーガア', id: 'corviknight' },
    { name: 'ミミッキュ', id: 'mimikyu-disguised' },
    { name: 'ドドゲザン', id: 'kingambit' },
    { name: 'メガゲンガー', id: 'gengar-mega' },
    { name: 'サザンドラ', id: 'hydreigon' },
    { name: 'マスカーニャ', id: 'meowscarada' },
    { name: 'ギルガルド', id: 'aegislash-shield' },
    { name: 'メガミミロップ', id: 'lopunny-mega' },
    { name: 'ウォッシュロトム', id: 'rotom-wash' },
    { name: 'キラフロル', id: 'glimmora' },
    { name: 'メガカイリュー', id: 'dragonite' },
    { name: 'メガマフォクシー', id: 'delphox' },
    { name: 'メガハッサム', id: 'scizor-mega' }
  ];
  const COMMON_DOUBLE = [
    { name: 'ガオガエン', id: 'incineroar' },
    { name: 'オオニューラ', id: 'sneasler' },
    { name: 'ガブリアス', id: 'garchomp' },
    { name: 'ドドゲザン', id: 'kingambit' },
    { name: 'ヤバソチャ', id: 'sinistcha' },
    { name: 'エルフーン', id: 'whimsicott' },
    { name: 'メガリザードンY', id: 'charizard-mega-y' },
    { name: 'イダイトウ♂', id: 'basculegion-male' },
    { name: 'メガバンギラス', id: 'tyranitar-mega' }
  ];

  const NATURE_MATRIX = [
    // [ -Atk, -Def, -SpA, -SpD, -Spe ]
    ['がんばりや', 'さみしがり', 'いじっぱり', 'やんちゃ', 'ゆうかん'],   // +Atk
    ['ずぶとい',   'すなお',     'わんぱく',   'のうてんき', 'のんき'],     // +Def
    ['ひかえめ',   'おっとり',   'まじめ',     'うっかりや', 'れいせい'],   // +SpA
    ['おだやか',   'おとなしい', 'しんちょう', 'きまぐれ',   'なまいき'],   // +SpD
    ['おくびょう', 'せっかち',   'ようき',     'むじゃき',   'てれや']      // +Spe
  ];

  let myParties = Array.from({length:10}, emptyParty);
  let myActive  = 0;
  let oppParty  = emptyParty();

  let modalSide    = null;
  let modalSlotIdx = null;
  let modalTab     = 'single'; // 'single', 'double', 'search'
  let myActiveSlot  = null;
  let oppActiveSlot = null;
  let allPokemon = [];

  // ===== 初期化 =====
  async function init() {
    loadState();
    buildTabs();
    renderBothParties();
    updateSpeedRanking();

    try {
      const gqlQuery = `{ pokemon_v2_pokemonspeciesname(where: {language_id: {_eq: 11}}) { name pokemon_species_id } }`;
      const [listRes, gqlRes] = await Promise.all([
        fetch('https://pokeapi.co/api/v2/pokemon?limit=1302&offset=0'),
        fetch('https://beta.pokeapi.co/graphql/v1beta', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({query: gqlQuery})
        })
      ]);
      const listData = await listRes.json();
      const gqlData  = await gqlRes.json();
      const jaMap = {};
      (gqlData.data?.pokemon_v2_pokemonspeciesname || []).forEach(n => {
        jaMap[n.pokemon_species_id] = n.name;
      });
      allPokemon = listData.results.map(p => {
        const parts = p.url.split('/').filter(Boolean);
        const id = parseInt(parts[parts.length - 1]);
        return { name: p.name, id, ja: jaMap[id] || p.name };
      });
    } catch(e) {
      console.error('API初期化失敗', e);
    }

    let timer;
    document.getElementById('modal-search').addEventListener('input', e => {
      clearTimeout(timer);
      timer = setTimeout(() => renderModalResults(e.target.value.trim()), 250);
    });
    document.getElementById('modal').addEventListener('click', e => {
      if (e.target === document.getElementById('modal')) closeModal();
    });
  }

  // ===== ローカルストレージ =====
  function saveState() {
    try {
      localStorage.setItem('pokedame_parties_v2', JSON.stringify(myParties));
      localStorage.setItem('pokedame_opp_v2',     JSON.stringify(oppParty));
      localStorage.setItem('pokedame_active',      myActive.toString());
    } catch(e) {}
  }

  function loadState() {
    try {
      const mp = localStorage.getItem('pokedame_parties_v2');
      if (mp) {
        const loaded = JSON.parse(mp);
        myParties = Array.from({length:10}, (_, i) =>
          loaded[i]
            ? Array.from({length:6}, (_, j) => loaded[i][j] ? mergeSlot(loaded[i][j]) : emptySlot())
            : emptyParty()
        );
      }
      const op = localStorage.getItem('pokedame_opp_v2');
      if (op) {
        const loaded = JSON.parse(op);
        oppParty = Array.from({length:6}, (_, i) => loaded[i] ? mergeSlot(loaded[i]) : emptySlot());
      }
      const ac = localStorage.getItem('pokedame_active');
      if (ac) myActive = parseInt(ac);
    } catch(e) {}
  }

  function mergeSlot(saved) {
    const base = emptySlot();
    return {
      ...base,
      ...saved,
      aps: {...base.aps, ...(saved.aps || {})},
      speMod: saved.speMod || 1.0,
      manualSpe: saved.manualSpe !== undefined ? saved.manualSpe : null
    };
  }

  // ===== タブ =====
  function buildTabs() {
    const container = document.getElementById('my-party-tabs');
    container.innerHTML = '';
    for (let i = 0; i < 10; i++) {
      const btn = document.createElement('button');
      btn.textContent = `パーティ${i + 1}`;
      btn.className = i === myActive
        ? 'px-3 py-1.5 rounded-lg text-sm font-bold bg-blue-500 text-white shadow'
        : 'px-3 py-1.5 rounded-lg text-sm font-bold bg-gray-100 text-gray-600 hover:bg-gray-200 transition';
      btn.onclick = () => {
        myActive = i;
        myActiveSlot = null;
        saveState();
        buildTabs();
        renderParty('my');
        updateSpeedRanking();
      };
      container.appendChild(btn);
    }
    document.getElementById('my-party-label').textContent = `パーティ${myActive + 1}`;
  }

  // ===== パーティ表示 =====
  function renderBothParties() { renderParty('my'); renderParty('opp'); }

  function renderParty(side) {
    const party      = side === 'my' ? myParties[myActive] : oppParty;
    const container  = document.getElementById(`${side}-slots`);
    const activeSlot = side === 'my' ? myActiveSlot : oppActiveSlot;

    container.innerHTML = '';
    party.forEach((slot, idx) => {
      const isSelected = activeSlot === idx;
      const div = document.createElement('div');
      div.className = isSelected
        ? (side === 'my'
            ? 'border-2 border-blue-400 bg-blue-50 rounded-xl p-2 text-center cursor-pointer transition'
            : 'border-2 border-red-400 bg-red-50 rounded-xl p-2 text-center cursor-pointer transition')
        : 'border-2 border-gray-200 rounded-xl p-2 text-center cursor-pointer hover:border-gray-400 transition';

      if (slot.pokemon) {
        let spe;
        if (slot.manualSpe !== null) {
          spe = slot.manualSpe;
        } else {
          spe = calcStat(slot.pokemon.baseStats.spe, slot.aps.spe, slot.nature, 'spe');
        }
        if (slot.speMod && slot.speMod !== 1.0) spe = Math.floor(spe * slot.speMod);
        const nd  = NATURES.find(n => n.name === slot.nature);
        const speTag = nd?.plus === 'spe' ? '↑' : nd?.minus === 'spe' ? '↓' : '';
        const modTag = slot.speMod === 1.5 ? ' (SC)' : slot.speMod === 2.0 ? ' (TW)' : '';
        const speColor = side === 'my' ? 'text-blue-600' : 'text-red-600';
        const totalAP = Object.values(slot.aps).reduce((s,v) => s+v, 0);
        div.innerHTML = `
          <img src="${slot.pokemon.sprite}" alt="" class="w-14 h-14 mx-auto object-contain">
          <p class="text-xs font-bold text-gray-700 leading-tight mt-1 truncate" title="${slot.pokemon.jaName}">${slot.pokemon.jaName}</p>
          <p class="text-xs text-gray-400">${slot.nature}・AP${totalAP}</p>
          <p class="text-sm font-bold ${speColor}">⚡${spe}${speTag}${modTag}</p>
        `;
      } else {
        div.innerHTML = `
          <div class="w-14 h-14 mx-auto flex items-center justify-center text-3xl text-gray-200 mt-1">＋</div>
          <p class="text-xs text-gray-300 mt-1">未登録</p>
          <p class="text-xs invisible">-</p>
          <p class="text-xs invisible">-</p>
        `;
      }

      div.onclick = () => {
        if (!slot.pokemon) {
          // 未登録なら即モーダル
          openModal(side, idx);
        } else {
          // すでに登録済みなら設定タブの切り替え
          if (side === 'my') myActiveSlot  = myActiveSlot  === idx ? null : idx;
          else               oppActiveSlot = oppActiveSlot === idx ? null : idx;
          renderParty(side);
          renderConfig(side);
        }
      };
      container.appendChild(div);
    });

    renderConfig(side);
  }

  // ===== スロット設定パネル =====
  function renderConfig(side) {
    const configEl   = document.getElementById(`${side}-config`);
    const party      = side === 'my' ? myParties[myActive] : oppParty;
    const activeSlot = side === 'my' ? myActiveSlot : oppActiveSlot;

    if (activeSlot === null || activeSlot === undefined) {
      configEl.classList.add('hidden');
      configEl.innerHTML = '';
      return;
    }
    configEl.classList.remove('hidden');

    const slot    = party[activeSlot];
    const ac      = side === 'my' ? 'blue' : 'red';
    const nd      = NATURES.find(n => n.name === slot.nature);
    const totalAP = Object.values(slot.aps).reduce((s,v) => s+v, 0);
    const remainAP = AP_MAX_TOTAL - totalAP;

    const natureOpts = NATURES.map(n =>
      `<option value="${n.name}" ${slot.nature === n.name ? 'selected' : ''}>${n.name}</option>`
    ).join('');

    let statsTable = '';
    if (slot.pokemon) {
      const natureMatrixHTML = `
        <div class="mt-2 mb-4">
          <label class="text-xs text-gray-500 font-bold mb-2 block">性格補正（上昇：行 / 下降：列）</label>
          <div class="grid grid-cols-6 gap-0.5 bg-gray-200 p-0.5 rounded-lg overflow-hidden border border-gray-200">
            <div class="bg-gray-50 border-b border-r text-[9px] flex items-center justify-center text-gray-400 font-bold">↑\\↓</div>
            ${ STAT_KEYS.filter(k=>k!=='hp').map(k => `<div class="bg-gray-50 border-b text-[10px] py-1 text-center font-bold text-blue-500">${STAT_LABELS[k].slice(0,2)}↓</div>`).join('') }
            
            ${ NATURE_MATRIX.map((row, rIdx) => {
              const plusStat = STAT_KEYS.filter(k=>k!=='hp')[rIdx];
              let rowHTML = `<div class="bg-gray-50 border-r text-[10px] py-2 text-center font-bold text-red-500 flex items-center justify-center">${STAT_LABELS[plusStat].slice(0,2)}↑</div>`;
              rowHTML += row.map((name, cIdx) => {
                const isSelected = slot.nature === name;
                const isNeutral = rIdx === cIdx;
                const colorClass = isSelected 
                  ? 'bg-yellow-400 text-white font-bold ring-2 ring-inset ring-yellow-500 z-10' 
                  : (isNeutral ? 'bg-white text-gray-300 hover:bg-gray-50' : 'bg-white text-gray-600 hover:bg-gray-50');
                return `<button onclick="updateSlotNature('${side}',${activeSlot},'${name}')" 
                  class="${colorClass} text-[10px] py-2 border-r border-b border-gray-100 transition-all leading-tight">
                  ${name}
                </button>`;
              }).join('');
              return rowHTML;
            }).join('') }
          </div>
        </div>
      `;
      const rows = STAT_KEYS.map(key => {
        const base = slot.pokemon.baseStats[key];
        const ap   = slot.aps[key];
        const real = calcStat(base, ap, slot.nature, key);
        const nUp   = nd?.plus  === key ? '<span class="text-red-500 font-bold ml-0.5">↑</span>' : '';
        const nDown = nd?.minus === key ? '<span class="text-blue-500 font-bold ml-0.5">↓</span>' : '';
        const isSpe = key === 'spe';
        const rowBg = isSpe ? (ac === 'blue' ? 'bg-blue-100' : 'bg-red-100') : '';
        const maxAP = Math.min(AP_MAX_SINGLE, ap + remainAP);
        return `<tr class="${rowBg}">
          <td class="py-1.5 pr-2 text-xs font-medium text-gray-600 whitespace-nowrap">
            ${STAT_LABELS[key]}${isSpe ? ' ⚡' : ''}
          </td>
          <td class="py-1.5 pr-3 text-xs text-center text-gray-500">${base}</td>
          <td class="py-1.5 pr-3">
            <div class="flex items-center gap-2 min-w-[140px]">
              <input type="range" id="${side}-ap-${key}-range" value="${ap}" min="0" max="${maxAP}"
                class="flex-1 h-1.5 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-${ac}-500"
                ${isSpe && slot.manualSpe !== null ? 'disabled opacity-30' : ''}
                oninput="syncSlotAP('${side}',${activeSlot},'${key}',this.value)"
                onchange="afterSlotUpdate('${side}',${activeSlot})">
              <input type="number" id="${side}-ap-${key}-number" value="${ap}" min="0" max="${maxAP}"
                class="w-10 border rounded px-1 py-0.5 text-xs text-center shrink-0"
                ${isSpe && slot.manualSpe !== null ? 'disabled opacity-30' : ''}
                oninput="syncSlotAP('${side}',${activeSlot},'${key}',this.value)"
                onchange="afterSlotUpdate('${side}',${activeSlot})">
              <button onclick="setMaxAP('${side}',${activeSlot},'${key}')"
                class="text-[10px] px-1.5 py-0.5 bg-gray-100 text-gray-500 border rounded hover:bg-gray-200 shrink-0"
                ${isSpe && slot.manualSpe !== null ? 'disabled opacity-30' : ''}>
                MAX
              </button>
            </div>
            ${isSpe ? `
              <div class="flex items-center gap-1 mt-2 mb-2 p-1.5 bg-gray-50 rounded border border-gray-100">
                <input type="checkbox" id="${side}-spe-manual-check" ${slot.manualSpe !== null ? 'checked' : ''}
                  onchange="updateSlotManualSpe('${side}',${activeSlot},this.checked ? (parseInt(document.getElementById('${side}-spe-manual-input').value) || 0) : null)">
                <label for="${side}-spe-manual-check" class="text-[10px] text-gray-500 font-bold shrink-0">実数値手動入力</label>
                <input type="number" id="${side}-spe-manual-input" value="${slot.manualSpe !== null ? slot.manualSpe : calcStat(slot.pokemon.baseStats.spe, slot.aps.spe, slot.nature, 'spe')}"
                  class="w-12 border rounded px-1 py-0.5 text-xs text-center ${slot.manualSpe === null ? 'bg-gray-100 text-gray-400' : 'bg-white font-bold text-blue-600 border-blue-200'}"
                  ${slot.manualSpe === null ? 'disabled' : ''}
                  oninput="updateSlotManualSpe('${side}',${activeSlot},parseInt(this.value) || 0, false)"
                  onchange="afterSlotUpdate('${side}',${activeSlot})">
              </div>
              <div class="flex gap-1 text-[10px] items-center">
                <span class="text-gray-400 font-bold">アイテム等:</span>
                <button onclick="updateSlotSpeMod('${side}',${activeSlot},1.0)" class="px-1.5 py-0.5 rounded border ${slot.speMod===1.0?'bg-gray-500 text-white':'bg-white text-gray-500'}">x1.0</button>
                <button onclick="updateSlotSpeMod('${side}',${activeSlot},1.5)" class="px-1.5 py-0.5 rounded border ${slot.speMod===1.5?'bg-blue-500 text-white':'bg-white text-gray-500'}">x1.5 (スカーフ)</button>
                <button onclick="updateSlotSpeMod('${side}',${activeSlot},2.0)" class="px-1.5 py-0.5 rounded border ${slot.speMod===2.0?'bg-red-500 text-white':'bg-white text-gray-500'}">x2.0 (追風/水水)</button>
              </div>
            ` : ''}
          </td>
          <td id="${side}-ap-${key}-real" class="py-1.5 text-sm font-bold text-${ac}-700 whitespace-nowrap">
            ${(function(){
              let sVal;
              if (isSpe && slot.manualSpe !== null) sVal = slot.manualSpe;
              else sVal = real;
              if (isSpe && slot.speMod !== 1.0) sVal = Math.floor(sVal * slot.speMod);
              return sVal;
            })()}${nUp}${nDown}
          </td>
        </tr>`;
      }).join('');

      statsTable = `
        <div class="flex items-center gap-3 mb-1 flex-wrap">
          <div class="ml-auto text-right">
            <p class="text-xs text-gray-400">残り能力ポイント</p>
            <p class="text-2xl font-black ${remainAP <= 0 ? 'text-red-500' : 'text-gray-700'}">
              <span id="${side}-remain-ap">${remainAP}</span>
              <span class="text-sm font-normal text-gray-400">/ ${AP_MAX_TOTAL}</span>
            </p>
          </div>
        </div>
        ${ natureMatrixHTML }
        <div class="overflow-x-auto">
          <table class="w-full text-xs">
            <thead>
              <tr class="text-gray-400 border-b">
                <th class="text-left pr-2 py-1 font-normal">ステータス</th>
                <th class="pr-3 py-1 font-normal">種族値</th>
                <th class="pr-3 py-1 font-normal">能力ポイント<br><span class="text-gray-300">（合計${AP_MAX_TOTAL}・最大${AP_MAX_SINGLE}）</span></th>
                <th class="py-1 font-normal">実数値</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      `;
    }

    configEl.innerHTML = `
      <div class="bg-${ac}-50 rounded-xl p-4 border border-${ac}-100">
        <div class="flex items-center justify-between mb-3">
          <p class="font-bold text-${ac}-700 text-sm">
            スロット${activeSlot + 1}：${slot.pokemon ? slot.pokemon.jaName : '未登録'}
          </p>
          <button onclick="openModal('${side}', ${activeSlot})"
            class="text-xs px-3 py-1.5 bg-${ac}-500 text-white rounded-lg hover:opacity-90 transition">
            ${slot.pokemon ? 'ポケモンを変更' : 'ポケモンを選択'}
          </button>
        </div>
        ${slot.pokemon ? statsTable : '<p class="text-sm text-gray-400">上のボタンからポケモンを選択してください</p>'}
      </div>
    `;
  }

  // ===== スロット更新 =====
  function getSlot(side, idx) {
    return side === 'my' ? myParties[myActive][idx] : oppParty[idx];
  }

  function updateSlotNature(side, idx, val) {
    getSlot(side, idx).nature = val;
    afterSlotUpdate(side, idx);
  }

  function updateSlotAP(side, idx, key, val) {
    const slot = getSlot(side, idx);
    let newVal = Math.min(AP_MAX_SINGLE, Math.max(0, parseInt(val) || 0));
    // 合計上限チェック
    const totalOther = Object.entries(slot.aps)
      .filter(([k]) => k !== key)
      .reduce((s, [, v]) => s + v, 0);
    newVal = Math.min(newVal, AP_MAX_TOTAL - totalOther);
    slot.aps[key] = newVal;
    afterSlotUpdate(side, idx);
  }

  function afterSlotUpdate(side, idx) {
    saveState();
    renderParty(side);
    renderConfig(side);
    updateSpeedRanking();
  }

  // ドラッグ中などの高速更新用
  function syncSlotAP(side, idx, key, val) {
    const slot = getSlot(side, idx);
    let newVal = Math.min(AP_MAX_SINGLE, Math.max(0, parseInt(val) || 0));
    const totalOther = Object.entries(slot.aps).filter(([k]) => k !== key).reduce((s, [, v]) => s + v, 0);
    newVal = Math.min(newVal, AP_MAX_TOTAL - totalOther);
    slot.aps[key] = newVal;

    const range  = document.getElementById(`${side}-ap-${key}-range`);
    const number = document.getElementById(`${side}-ap-${key}-number`);
    const real   = document.getElementById(`${side}-ap-${key}-real`);
    if (range)  range.value  = newVal;
    if (number) number.value = newVal;
    if (real && slot.pokemon) {
      let realVal;
      if (key === 'spe' && slot.manualSpe !== null) {
        realVal = slot.manualSpe;
      } else {
        realVal = calcStat(slot.pokemon.baseStats[key], newVal, slot.nature, key);
      }
      if (key === 'spe' && slot.speMod && slot.speMod !== 1.0) realVal = Math.floor(realVal * slot.speMod);
      const nd  = NATURES.find(n => n.name === slot.nature);
      const nUp   = nd?.plus  === key ? '<span class="text-red-500 font-bold ml-0.5">↑</span>' : '';
      const nDown = nd?.minus === key ? '<span class="text-blue-500 font-bold ml-0.5">↓</span>' : '';
      real.innerHTML = `${realVal}${nUp}${nDown}`;
    }

    const totalAP = Object.values(slot.aps).reduce((s,v) => s+v, 0);
    const remainAP = AP_MAX_TOTAL - totalAP;
    const remainEl = document.getElementById(`${side}-remain-ap`);
    if (remainEl) {
      remainEl.textContent = remainAP;
      remainEl.parentElement.className = `text-2xl font-black ${remainAP <= 0 ? 'text-red-500' : 'text-gray-700'}`;
    }

    // 他ステータスの最大値を制限してスライダーの可動範囲を更新
    STAT_KEYS.forEach(k => {
      const r = document.getElementById(`${side}-ap-${k}-range`);
      const n = document.getElementById(`${side}-ap-${k}-number`);
      if (r) r.max = Math.min(AP_MAX_SINGLE, slot.aps[k] + remainAP);
      if (n) n.max = Math.min(AP_MAX_SINGLE, slot.aps[k] + remainAP);
    });
  }

  function setMaxAP(side, idx, key) {
    const slot = getSlot(side, idx);
    const totalOther = Object.entries(slot.aps).filter(([k]) => k !== key).reduce((s, [, v]) => s + v, 0);
    const maxVal = Math.min(AP_MAX_SINGLE, AP_MAX_TOTAL - totalOther);
    updateSlotAP(side, idx, key, maxVal);
  }

  function updateSlotSpeMod(side, idx, mod) {
    const slot = getSlot(side, idx);
    slot.speMod = mod;
    afterSlotUpdate(side, idx);
  }

  function updateSlotManualSpe(side, idx, val, redraw = true) {
    const slot = getSlot(side, idx);
    slot.manualSpe = val;
    if (redraw) {
      afterSlotUpdate(side, idx);
    } else {
      // リアルタイム更新（Rankingなどは重いのでUIの数値のみ）
      const real = document.getElementById(`${side}-ap-spe-real`);
      if (real) {
        let finalSpe = val;
        if (slot.speMod !== 1.0) finalSpe = Math.floor(val * slot.speMod);
        const nd  = NATURES.find(n => n.name === slot.nature);
        const nUp   = nd?.plus  === 'spe' ? '<span class="text-red-500 font-bold ml-0.5">↑</span>' : '';
        const nDown = nd?.minus === 'spe' ? '<span class="text-blue-500 font-bold ml-0.5">↓</span>' : '';
        real.innerHTML = `${finalSpe}${nUp}${nDown}`;
      }
    }
  }

  // ===== モーダル =====
  function openModal(side, idx) {
    modalSide    = side;
    modalSlotIdx = idx;
    modalTab     = 'single';
    document.getElementById('modal-search').value = '';
    document.getElementById('modal-results').innerHTML = '';
    document.getElementById('modal').style.display = 'flex';
    renderQuickSelect();
    updateModalTabUI();
    setTimeout(() => document.getElementById('modal-search').focus(), 50);
  }

  function closeModal() {
    document.getElementById('modal').style.display = 'none';
    modalSide = null; modalSlotIdx = null;
  }

  function updateModalTabUI() {
    ['single', 'double', 'search'].forEach(t => {
      const btn = document.getElementById(`tab-btn-${t}`);
      const pane = document.getElementById(`tab-pane-${t}`);
      if (t === modalTab) {
        btn.classList.add('border-blue-500', 'text-blue-600', 'bg-blue-50');
        btn.classList.remove('border-transparent', 'text-gray-500');
        pane.classList.remove('hidden');
      } else {
        btn.classList.remove('border-blue-500', 'text-blue-600', 'bg-blue-50');
        btn.classList.add('border-transparent', 'text-gray-500');
        pane.classList.add('hidden');
      }
    });
  }

  function setModalTab(tab) {
    modalTab = tab;
    updateModalTabUI();
  }

  function renderQuickSelect() {
    const renderList = (list, containerId) => {
      const container = document.getElementById(containerId);
      container.innerHTML = list.map(p => `
        <button onclick="fetchAndSetPokemon('${p.id}')" 
          class="flex items-center gap-1 p-1 border rounded hover:bg-blue-50 transition text-left overflow-hidden">
          <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${getIconId(p.id)}.png" 
            class="w-8 h-8 object-contain shrink-0" onerror="this.src='https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/0.png'">
          <span class="text-[10px] truncate leading-tight">${p.name}</span>
        </button>
      `).join('');
    };
    renderList(COMMON_SINGLE, 'quick-list-single');
    renderList(COMMON_DOUBLE, 'quick-list-double');
  }

  function getIconId(id) {
    const map = {
      'charizard-mega-y': 6,
      'gengar-mega': 94,
      'scizor-mega': 212,
      'tyranitar-mega': 248,
      'lopunny-mega': 427,
      'mimikyu-disguised': 778,
      'garchomp': 445,
      'archaludon': 1022,
      'kingambit': 983,
      'meowscarada': 914,
      'glimmora': 970,
      'incineroar': 727,
      'sneasler': 903,
      'sinistcha': 1013,
      'whimsicott': 547,
      'basculegion-male': 902
    };
    return map[id] || (allPokemon.find(p => p.name === id)?.id) || 0;
  }

  function clearSlot() {
    if (modalSide === null) return;
    const slot = getSlot(modalSide, modalSlotIdx);
    slot.pokemon = null;
    saveState();
    renderParty(modalSide);
    renderConfig(modalSide);
    updateSpeedRanking();
    closeModal();
  }

  function renderModalResults(query) {
    const resultsEl = document.getElementById('modal-results');
    if (!query) { resultsEl.innerHTML = ''; return; }

    // 文字が入力されたら検索タブへ
    if (modalTab !== 'search') {
      setModalTab('search');
    }

    let matches = [];
    if (/^\d+$/.test(query)) {
      matches = allPokemon.filter(p => p.id === parseInt(query));
    } else {
      const q = query.toLowerCase();
      matches = allPokemon.filter(p =>
        p.ja.includes(query) || p.name.includes(q)
      ).slice(0, 40);
    }

    resultsEl.innerHTML = '';
    if (matches.length === 0) {
      resultsEl.innerHTML = '<p class="text-gray-400 text-sm p-2 w-full">見つかりません</p>';
      return;
    }

    matches.forEach(p => {
      const btn = document.createElement('button');
      btn.className = 'flex flex-col items-center p-1.5 rounded-lg hover:bg-blue-50 transition text-center';
      const img = document.createElement('img');
      img.src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${p.id}.png`;
      img.alt = p.name;
      img.className = 'w-12 h-12 object-contain';
      img.onerror = () => { img.style.display = 'none'; };
      const idEl = document.createElement('span');
      idEl.className = 'text-xs text-gray-400';
      idEl.textContent = `#${p.id}`;
      const naEl = document.createElement('span');
      naEl.className = 'text-xs font-medium text-gray-700';
      naEl.textContent = p.ja || p.name;
      btn.appendChild(img); btn.appendChild(idEl); btn.appendChild(naEl);
      btn.onclick = () => fetchAndSetPokemon(p.name);
      resultsEl.appendChild(btn);
    });
  }

  async function fetchAndSetPokemon(name) {
    const resultsEl = document.getElementById('modal-results');
    resultsEl.innerHTML = '<p class="text-gray-400 text-sm p-4 w-full text-center">読み込み中...</p>';
    try {
      const [pokemonRes, speciesRes] = await Promise.all([
        fetch(`https://pokeapi.co/api/v2/pokemon/${name}`),
        fetch(`https://pokeapi.co/api/v2/pokemon-species/${name}`)
      ]);
      const pokemon = await pokemonRes.json();
      const species = await speciesRes.json();

      const jaName = species.names.find(n => n.language.name === 'ja-Hrkt')?.name
        || species.names.find(n => n.language.name === 'ja')?.name
        || pokemon.name;
      const sprite = pokemon.sprites.other?.['official-artwork']?.front_default
        || pokemon.sprites.front_default || '';
      const baseStats = {
        hp:  pokemon.stats[0].base_stat,
        atk: pokemon.stats[1].base_stat,
        def: pokemon.stats[2].base_stat,
        spa: pokemon.stats[3].base_stat,
        spd: pokemon.stats[4].base_stat,
        spe: pokemon.stats[5].base_stat,
      };

      const slot = getSlot(modalSide, modalSlotIdx);
      slot.pokemon = { id: pokemon.id, name: pokemon.name, jaName, sprite, baseStats };

      saveState();
      renderParty(modalSide);
      renderConfig(modalSide);
      updateSpeedRanking();
      closeModal();
    } catch(e) {
      console.error(e);
      resultsEl.innerHTML = '<p class="text-red-400 text-sm p-4 w-full text-center">取得に失敗しました。再度お試しください。</p>';
    }
  }

  // ===== 実数値計算（ポケモンチャンピオンズ仕様）=====
  // HP: floor((種族値×2 + 31 + AP×2) × 50/100) + 60
  // 他: floor((floor((種族値×2 + 31 + AP×2) × 50/100) + 5) × 性格補正)
  function calcStat(base, ap, natureName, key) {
    const inner = Math.floor((base * 2 + FIXED_IV + ap * 2) * FIXED_LV / 100);
    if (key === 'hp') {
      return inner + 60;
    }
    const raw = inner + 5;
    const nd  = NATURES.find(n => n.name === natureName);
    const m   = nd?.plus === key ? 1.1 : nd?.minus === key ? 0.9 : 1.0;
    return Math.floor(raw * m);
  }

  // ===== ⚡ すばやさランキング =====
  function updateSpeedRanking() {
    const entries = [];

    // 自分側
    myParties[myActive].forEach((slot, i) => {
      if (!slot.pokemon) return;
      let spe;
      if (slot.manualSpe !== null) {
        spe = slot.manualSpe;
      } else {
        spe = calcStat(slot.pokemon.baseStats.spe, slot.aps.spe, slot.nature, 'spe');
      }
      if (slot.speMod && slot.speMod !== 1.0) spe = Math.floor(spe * slot.speMod);
      const nd  = NATURES.find(n => n.name === slot.nature);
      const tag = nd?.plus === 'spe' ? '↑' : nd?.minus === 'spe' ? '↓' : '';
      const modTag = slot.speMod === 1.5 ? '(SC)' : slot.speMod === 2.0 ? '(TW)' : '';
      entries.push({ 
        pokemon: slot.pokemon, spe, nature: slot.nature, tag: tag + modTag, 
        baseSpe: slot.pokemon.baseStats.spe, apSpe: slot.aps.spe, side: 'my', idx: i 
      });
    });

    // 相手側 (3パターン想定)
    oppParty.forEach((slot, i) => {
      if (!slot.pokemon) return;
      const base = slot.pokemon.baseStats.spe;
      
      // 1. 無振
      const sMin = calcStat(base, 0, 'まじめ', 'spe');
      entries.push({ pokemon: slot.pokemon, spe: sMin, side: 'opp', idx: i, virtual: '(無振)', nature: 'まじめ', baseSpe: base, apSpe: 0, tag: '' });
      
      // 2. 最速
      const sMax = calcStat(base, 32, 'おくびょう', 'spe');
      entries.push({ pokemon: slot.pokemon, spe: sMax, side: 'opp', idx: i, virtual: '(最速)', nature: 'おくびょう', baseSpe: base, apSpe: 32, tag: '↑' });
      
      // 3. 最速スカーフ
      const sScarf = Math.floor(sMax * 1.5);
      entries.push({ pokemon: slot.pokemon, spe: sScarf, side: 'opp', idx: i, virtual: '(最速SC)', nature: 'おくびょう', baseSpe: base, apSpe: 32, tag: '↑(SC)' });
    });

    const rankEl = document.getElementById('speed-ranking');
    if (entries.length === 0) {
      rankEl.innerHTML = '<p class="text-gray-400 text-center py-10">パーティにポケモンを登録してください</p>';
      return;
    }

    entries.sort((a, b) => b.spe - a.spe);
    const maxVal = entries[0].spe;
    const minVal = Math.min(...entries.map(e => e.spe));
    const rangeVal = Math.max(1, maxVal - minVal);

    // タイムライン描画
    const timelinePins   = document.getElementById('speed-timeline-pins');
    const timelineLabels = document.getElementById('speed-timeline-labels');
    timelinePins.innerHTML = '';
    
    // 目盛りラベル作成
    const startL = Math.floor(minVal / 10) * 10;
    const endL   = Math.ceil(maxVal / 10) * 10;
    let labelHTML = '';
    for (let l = startL; l <= endL; l += 20) {
      const left = ((l - minVal) / (rangeVal || 1)) * 100;
      if (left >= 0 && left <= 100) {
        labelHTML += `<span style="position:absolute; left:${left}%; transform:translateX(-50%)">${l}</span>`;
      }
    }
    timelineLabels.innerHTML = labelHTML;

    // ポケモンピン配置
    const speGroups = {};
    entries.forEach(e => {
      if (!speGroups[e.spe]) speGroups[e.spe] = [];
      speGroups[e.spe].push(e);
    });

    Object.keys(speGroups).forEach(spe => {
      const group = speGroups[spe];
      const left = ((spe - minVal) / (rangeVal || 1)) * 100;
      
      const myEntries = group.filter(e => e.side === 'my');
      const oppEntries = group.filter(e => e.side === 'opp');

      // 自分（上側）
      myEntries.forEach((e, gi) => {
        const pin = document.createElement('div');
        pin.className = 'absolute bottom-0 flex flex-col items-center group z-20';
        pin.style.left = `${left}%`;
        pin.style.transform = 'translateX(-50%)';
        const yOffset = gi * 30 + 10; 

        pin.innerHTML = `
          <div class="relative flex flex-col-reverse items-center" style="margin-bottom: ${yOffset}px">
            <div class="bg-white border-2 border-blue-500 rounded-full p-0.5 shadow-sm hover:scale-125 transition-transform cursor-help">
              <img src="${e.pokemon.sprite}" class="w-7 h-7 object-contain">
            </div>
            <div class="bg-blue-500 text-white font-mono font-bold text-[8px] px-1 rounded absolute -top-3 whitespace-nowrap z-30">
              ${spe}
            </div>
            <div class="w-0.5 bg-blue-500 opacity-20 absolute -z-10" style="height: ${yOffset}px; bottom: -${yOffset}px"></div>
          </div>
        `;
        timelinePins.appendChild(pin);
      });

      // 相手（下側）
      oppEntries.forEach((e, gi) => {
        const pin = document.createElement('div');
        pin.className = 'absolute top-0 flex flex-col items-center group z-10';
        pin.style.left = `${left}%`;
        pin.style.transform = 'translateX(-50%)';
        const yOffset = gi * 30 + 10;

        pin.innerHTML = `
          <div class="relative flex flex-col items-center" style="margin-top: ${yOffset}px">
            <div class="bg-white border-2 border-red-400 rounded-full p-0.5 shadow-sm hover:scale-125 transition-transform cursor-help">
              <img src="${e.pokemon.sprite}" class="w-7 h-7 object-contain grayscale-[0.3]">
            </div>
            <div class="bg-red-400 text-white font-mono font-bold text-[8px] px-1 rounded absolute -bottom-3 whitespace-nowrap z-30">
              ${spe}
            </div>
            <div class="w-0.5 bg-red-400 opacity-20 absolute -z-10" style="height: ${yOffset}px; top: -${yOffset}px"></div>
          </div>
        `;
        timelinePins.appendChild(pin);
      });
    });

    const maxSpe = entries[0].spe;
    const speCount = {};
    entries.forEach(e => { speCount[e.spe] = (speCount[e.spe] || 0) + 1; });

    rankEl.innerHTML = '';
    let rank = 1;
    let prevSpe = null;

    entries.forEach((e, i) => {
      if (prevSpe !== null && e.spe < prevSpe) rank = i + 1;
      prevSpe = e.spe;

      const isMy    = e.side === 'my';
      const pct     = Math.round(e.spe / maxSpe * 100);
      const isTied  = speCount[e.spe] > 1;
      const barClass  = isMy ? 'bg-blue-500'  : 'bg-red-400';
      const tagBg     = isMy ? 'bg-blue-100 text-blue-600' : 'bg-red-100 text-red-600';
      const teamLabel = isMy ? '自分' : `相手${e.virtual || ''}`;
      const rankColor = rank === 1 ? 'text-yellow-500' : rank <= 3 ? 'text-gray-500' : 'text-gray-300';

      const row = document.createElement('div');
      row.className = `flex items-center gap-3 py-2.5 border-b border-gray-100 last:border-0 ${e.virtual ? 'bg-red-50/30' : ''}`;
      row.innerHTML = `
        <div class="text-base font-black ${rankColor} w-7 text-center shrink-0">${rank}</div>
        <img src="${e.pokemon.sprite}" alt="" class="w-11 h-11 object-contain shrink-0 ${e.virtual ? 'grayscale-[0.5]' : ''}">
        <div class="w-32 shrink-0 min-w-0">
          <p class="text-sm font-bold text-gray-800 leading-tight truncate">${e.pokemon.jaName}</p>
          <p class="text-xs text-gray-400">${e.nature}・種${e.baseSpe}・AP${e.apSpe}</p>
        </div>
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-2">
            <div class="flex-1 bg-gray-100 rounded-full h-7 overflow-hidden relative min-w-0">
              <div class="${barClass} h-full rounded-full flex items-center px-3"
                style="width:${Math.max(pct,8)}%; transition: width 0.3s ease;">
                <span class="text-white text-sm font-bold whitespace-nowrap">${e.spe}${e.tag}</span>
              </div>
            </div>
            <span class="text-xs font-bold px-2 py-0.5 rounded-full shrink-0 ${tagBg}">${teamLabel}</span>
            ${isTied ? '<span class="text-xs bg-yellow-100 text-yellow-600 px-2 py-0.5 rounded-full font-bold shrink-0">同速</span>' : ''}
          </div>
        </div>
      `;
      rankEl.appendChild(row);
    });
  }

  // 起動
  init();
</script>
</body>
</html>
