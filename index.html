<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ポケモン 種族値・実数値比較</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">

  <header class="bg-white shadow-sm py-5 mb-8">
    <h1 class="text-2xl font-bold text-center text-gray-800">ポケモン 種族値・実数値比較</h1>
    <p class="text-center text-gray-400 text-sm mt-1">PokéAPI 使用</p>
  </header>

  <main class="max-w-5xl mx-auto px-4 pb-16">

    <!-- ポケモン選択エリア -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">

      <!-- 自分のポケモン -->
      <div class="bg-white rounded-2xl shadow-md p-5">
        <h2 class="text-lg font-bold text-blue-600 mb-3 flex items-center gap-2">
          <span class="w-3 h-3 rounded-full bg-blue-500 inline-block"></span> 自分のポケモン
        </h2>
        <input id="my-search" type="text" placeholder="英語名 or 図鑑番号で検索..."
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm mb-2 focus:outline-none focus:ring-2 focus:ring-blue-400">
        <div id="my-results" class="flex flex-wrap gap-1 max-h-44 overflow-y-auto p-1 rounded"></div>
        <div id="my-loading" class="hidden text-gray-400 text-sm text-center py-3">読み込み中...</div>
        <div id="my-card" class="hidden mt-3 flex flex-col items-center">
          <img id="my-sprite" class="w-32 h-32 object-contain" src="" alt="">
          <p id="my-ja-name" class="text-lg font-bold text-gray-800 mt-1"></p>
          <p id="my-en-name" class="text-sm text-gray-400"></p>
          <button onclick="clearPokemon('my')"
            class="mt-2 text-xs text-gray-400 hover:text-red-400 transition">✕ クリア</button>
        </div>
      </div>

      <!-- 相手のポケモン -->
      <div class="bg-white rounded-2xl shadow-md p-5">
        <h2 class="text-lg font-bold text-red-600 mb-3 flex items-center gap-2">
          <span class="w-3 h-3 rounded-full bg-red-500 inline-block"></span> 相手のポケモン
        </h2>
        <input id="opp-search" type="text" placeholder="英語名 or 図鑑番号で検索..."
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm mb-2 focus:outline-none focus:ring-2 focus:ring-red-400">
        <div id="opp-results" class="flex flex-wrap gap-1 max-h-44 overflow-y-auto p-1 rounded"></div>
        <div id="opp-loading" class="hidden text-gray-400 text-sm text-center py-3">読み込み中...</div>
        <div id="opp-card" class="hidden mt-3 flex flex-col items-center">
          <img id="opp-sprite" class="w-32 h-32 object-contain" src="" alt="">
          <p id="opp-ja-name" class="text-lg font-bold text-gray-800 mt-1"></p>
          <p id="opp-en-name" class="text-sm text-gray-400"></p>
          <button onclick="clearPokemon('opp')"
            class="mt-2 text-xs text-gray-400 hover:text-red-400 transition">✕ クリア</button>
        </div>
      </div>
    </div>

    <!-- ヒント（未選択時） -->
    <div id="hint-section" class="text-center text-gray-400 py-16">
      <p class="text-5xl mb-4">⚔️</p>
      <p class="text-lg">両方のポケモンを選択すると<br>種族値・実数値を比較できます</p>
    </div>

    <!-- 比較エリア（両方選択後に表示） -->
    <div id="compare-section" class="hidden">

      <!-- 種族値比較 -->
      <div class="bg-white rounded-2xl shadow-md p-6 mb-6">
        <h2 class="text-xl font-bold text-gray-800 mb-4">種族値比較</h2>
        <div class="flex justify-between text-sm font-bold mb-3 px-1">
          <span class="text-blue-600" id="base-my-name">---</span>
          <span class="text-red-600" id="base-opp-name">---</span>
        </div>
        <div id="base-stats-list" class="space-y-2"></div>
        <div class="flex justify-between text-sm mt-4 px-1 border-t pt-3">
          <span class="text-gray-500">合計: <span id="my-total" class="font-bold text-blue-600 text-base"></span></span>
          <span class="text-gray-500">合計: <span id="opp-total" class="font-bold text-red-600 text-base"></span></span>
        </div>
      </div>

      <!-- 実数値比較 -->
      <div class="bg-white rounded-2xl shadow-md p-6">
        <h2 class="text-xl font-bold text-gray-800 mb-5">実数値比較</h2>

        <!-- 基本設定 -->
        <div class="grid grid-cols-2 gap-4 mb-6">
          <div class="bg-blue-50 rounded-xl p-4">
            <p class="text-blue-700 font-bold text-sm mb-3">自分の設定</p>
            <div class="flex flex-wrap gap-3">
              <div>
                <label class="text-xs text-gray-500 block mb-1">レベル</label>
                <input id="my-lv" type="number" value="50" min="1" max="100"
                  class="w-16 border rounded px-2 py-1 text-sm" oninput="updateRealStats()">
              </div>
              <div>
                <label class="text-xs text-gray-500 block mb-1">性格</label>
                <select id="my-nature" class="border rounded px-2 py-1 text-sm" onchange="updateRealStats()"></select>
              </div>
            </div>
          </div>
          <div class="bg-red-50 rounded-xl p-4">
            <p class="text-red-700 font-bold text-sm mb-3">相手の設定</p>
            <div class="flex flex-wrap gap-3">
              <div>
                <label class="text-xs text-gray-500 block mb-1">レベル</label>
                <input id="opp-lv" type="number" value="50" min="1" max="100"
                  class="w-16 border rounded px-2 py-1 text-sm" oninput="updateRealStats()">
              </div>
              <div>
                <label class="text-xs text-gray-500 block mb-1">性格</label>
                <select id="opp-nature" class="border rounded px-2 py-1 text-sm" onchange="updateRealStats()"></select>
              </div>
            </div>
          </div>
        </div>

        <!-- 各ステータス行 -->
        <div id="real-stats-list" class="space-y-4"></div>

        <div class="flex justify-between text-sm mt-4 px-1 border-t pt-3">
          <span class="text-gray-500">実数値合計: <span id="my-real-total" class="font-bold text-blue-600 text-base"></span></span>
          <span class="text-gray-500">実数値合計: <span id="opp-real-total" class="font-bold text-red-600 text-base"></span></span>
        </div>
      </div>
    </div>

  </main>

  <script>
    // 定数
    const STAT_KEYS  = ['hp', 'atk', 'def', 'spa', 'spd', 'spe'];
    const STAT_LABELS = { hp: 'HP', atk: 'こうげき', def: 'ぼうぎょ', spa: 'とくこう', spd: 'とくぼう', spe: 'すばやさ' };
    const BASE_MAX = 255;

    const NATURES = [
      { name: 'まじめ',     plus: null,  minus: null },
      { name: 'がんばりや', plus: null,  minus: null },
      { name: 'すなお',     plus: null,  minus: null },
      { name: 'てれや',     plus: null,  minus: null },
      { name: 'きまぐれ',   plus: null,  minus: null },
      { name: 'さみしがり', plus: 'atk', minus: 'def' },
      { name: 'いじっぱり', plus: 'atk', minus: 'spa' },
      { name: 'やんちゃ',   plus: 'atk', minus: 'spd' },
      { name: 'ゆうかん',   plus: 'atk', minus: 'spe' },
      { name: 'ずぶとい',   plus: 'def', minus: 'atk' },
      { name: 'わんぱく',   plus: 'def', minus: 'spa' },
      { name: 'のうてんき', plus: 'def', minus: 'spd' },
      { name: 'のんき',     plus: 'def', minus: 'spe' },
      { name: 'ひかえめ',   plus: 'spa', minus: 'atk' },
      { name: 'おっとり',   plus: 'spa', minus: 'def' },
      { name: 'うっかりや', plus: 'spa', minus: 'spd' },
      { name: 'れいせい',   plus: 'spa', minus: 'spe' },
      { name: 'おだやか',   plus: 'spd', minus: 'atk' },
      { name: 'おとなしい', plus: 'spd', minus: 'def' },
      { name: 'しんちょう', plus: 'spd', minus: 'spa' },
      { name: 'なまいき',   plus: 'spd', minus: 'spe' },
      { name: 'おくびょう', plus: 'spe', minus: 'atk' },
      { name: 'せっかち',   plus: 'spe', minus: 'def' },
      { name: 'ようき',     plus: 'spe', minus: 'spa' },
      { name: 'むじゃき',   plus: 'spe', minus: 'spd' },
    ];

    // 状態
    let allPokemon = [];
    let myData  = null;
    let oppData = null;
    // IV/EV を JS変数で保持（DOM再生成時に値を失わないため）
    let myIVs  = { hp: 31, atk: 31, def: 31, spa: 31, spd: 31, spe: 31 };
    let myEVs  = { hp: 0,  atk: 0,  def: 0,  spa: 0,  spd: 0,  spe: 0  };
    let oppIVs = { hp: 31, atk: 31, def: 31, spa: 31, spd: 31, spe: 31 };
    let oppEVs = { hp: 0,  atk: 0,  def: 0,  spa: 0,  spd: 0,  spe: 0  };

    // ---------- 初期化 ----------
    async function init() {
      // 性格セレクトボックス生成
      ['my-nature', 'opp-nature'].forEach(id => {
        const sel = document.getElementById(id);
        NATURES.forEach(n => {
          const opt = document.createElement('option');
          opt.value = n.name;
          opt.textContent = n.name;
          sel.appendChild(opt);
        });
      });

      // 全ポケモンリスト取得（名前検索用）
      try {
        const res  = await fetch('https://pokeapi.co/api/v2/pokemon?limit=1302&offset=0');
        const data = await res.json();
        allPokemon = data.results.map(p => {
          const parts = p.url.split('/').filter(Boolean);
          return { name: p.name, id: parseInt(parts[parts.length - 1]) };
        });
      } catch (e) {
        console.error('ポケモンリスト取得失敗', e);
      }

      setupSearch('my');
      setupSearch('opp');
    }

    // ---------- 検索 ----------
    function setupSearch(side) {
      const input = document.getElementById(`${side}-search`);
      let timer;
      input.addEventListener('input', () => {
        clearTimeout(timer);
        timer = setTimeout(() => renderResults(side, input.value.trim()), 250);
      });
    }

    function renderResults(side, query) {
      const resultsEl = document.getElementById(`${side}-results`);
      if (!query) { resultsEl.innerHTML = ''; return; }

      let matches = [];
      if (/^\d+$/.test(query)) {
        const id = parseInt(query);
        matches = allPokemon.filter(p => p.id === id);
      } else {
        matches = allPokemon.filter(p => p.name.includes(query.toLowerCase())).slice(0, 30);
      }

      resultsEl.innerHTML = '';
      if (matches.length === 0) {
        resultsEl.innerHTML = '<p class="text-gray-400 text-xs p-1">見つかりません</p>';
        return;
      }

      matches.forEach(p => {
        const btn = document.createElement('button');
        btn.className = 'flex flex-col items-center p-1 rounded-lg hover:bg-gray-100 transition text-center';
        const iconUrl = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${p.id}.png`;
        const img = document.createElement('img');
        img.src = iconUrl;
        img.alt = p.name;
        img.className = 'w-12 h-12 object-contain';
        img.onerror = () => { img.style.display = 'none'; };
        const idSpan  = document.createElement('span');
        idSpan.className = 'text-xs text-gray-400';
        idSpan.textContent = `#${p.id}`;
        const nameSpan = document.createElement('span');
        nameSpan.className = 'text-xs text-gray-600';
        nameSpan.textContent = p.name;
        btn.appendChild(img);
        btn.appendChild(idSpan);
        btn.appendChild(nameSpan);
        btn.onclick = () => selectPokemon(side, p.name);
        resultsEl.appendChild(btn);
      });
    }

    // ---------- ポケモン選択 ----------
    async function selectPokemon(side, name) {
      const loadingEl = document.getElementById(`${side}-loading`);
      const cardEl    = document.getElementById(`${side}-card`);
      const resultsEl = document.getElementById(`${side}-results`);
      const searchEl  = document.getElementById(`${side}-search`);

      loadingEl.classList.remove('hidden');
      cardEl.classList.add('hidden');
      resultsEl.innerHTML = '';

      try {
        const [pokemonRes, speciesRes] = await Promise.all([
          fetch(`https://pokeapi.co/api/v2/pokemon/${name}`),
          fetch(`https://pokeapi.co/api/v2/pokemon-species/${name}`)
        ]);
        const pokemon = await pokemonRes.json();
        const species = await speciesRes.json();

        const jaName = species.names.find(n => n.language.name === 'ja-Hrkt')?.name
          || species.names.find(n => n.language.name === 'ja')?.name
          || pokemon.name;

        const sprite = pokemon.sprites.other?.['official-artwork']?.front_default
          || pokemon.sprites.front_default
          || '';

        const baseStats = {
          hp:  pokemon.stats[0].base_stat,
          atk: pokemon.stats[1].base_stat,
          def: pokemon.stats[2].base_stat,
          spa: pokemon.stats[3].base_stat,
          spd: pokemon.stats[4].base_stat,
          spe: pokemon.stats[5].base_stat,
        };

        const data = { id: pokemon.id, name: pokemon.name, jaName, sprite, baseStats };
        if (side === 'my') myData = data;
        else oppData = data;

        document.getElementById(`${side}-sprite`).src    = sprite;
        document.getElementById(`${side}-ja-name`).textContent = jaName;
        document.getElementById(`${side}-en-name`).textContent = pokemon.name;
        searchEl.value = '';
        cardEl.classList.remove('hidden');

        updateCompare();
      } catch (e) {
        console.error('ポケモンデータ取得失敗', e);
        alert('データの取得に失敗しました。名前が正しいか確認してください。');
      } finally {
        loadingEl.classList.add('hidden');
      }
    }

    function clearPokemon(side) {
      if (side === 'my') myData = null;
      else oppData = null;
      document.getElementById(`${side}-card`).classList.add('hidden');
      document.getElementById(`${side}-search`).value = '';
      document.getElementById(`${side}-results`).innerHTML = '';
      updateCompare();
    }

    // ---------- 比較表示 ----------
    function updateCompare() {
      const showCompare = myData && oppData;
      document.getElementById('compare-section').classList.toggle('hidden', !showCompare);
      document.getElementById('hint-section').classList.toggle('hidden', showCompare);
      if (!showCompare) return;
      updateBaseStats();
      updateRealStats();
    }

    function updateBaseStats() {
      document.getElementById('base-my-name').textContent  = myData.jaName;
      document.getElementById('base-opp-name').textContent = oppData.jaName;

      let myTotal = 0, oppTotal = 0;
      const listEl = document.getElementById('base-stats-list');
      listEl.innerHTML = '';

      STAT_KEYS.forEach(key => {
        const myVal  = myData.baseStats[key];
        const oppVal = oppData.baseStats[key];
        myTotal  += myVal;
        oppTotal += oppVal;

        const myPct  = Math.round(myVal  / BASE_MAX * 100);
        const oppPct = Math.round(oppVal / BASE_MAX * 100);
        const myColor  = myVal  >= oppVal ? 'bg-blue-500' : 'bg-blue-300';
        const oppColor = oppVal >= myVal  ? 'bg-red-500'  : 'bg-red-300';

        const row = document.createElement('div');
        row.className = 'flex items-center gap-2';
        row.innerHTML = `
          <div class="w-5/12 flex items-center justify-end gap-2">
            <span class="text-sm font-bold text-blue-700 w-8 text-right">${myVal}</span>
            <div class="flex-1 bg-gray-100 rounded h-5 overflow-hidden flex justify-end">
              <div class="${myColor} h-full rounded-l" style="width:${myPct}%"></div>
            </div>
          </div>
          <div class="w-2/12 text-center text-xs font-bold text-gray-500 shrink-0">${STAT_LABELS[key]}</div>
          <div class="w-5/12 flex items-center gap-2">
            <div class="flex-1 bg-gray-100 rounded h-5 overflow-hidden">
              <div class="${oppColor} h-full rounded-r" style="width:${oppPct}%"></div>
            </div>
            <span class="text-sm font-bold text-red-700 w-8">${oppVal}</span>
          </div>
        `;
        listEl.appendChild(row);
      });

      document.getElementById('my-total').textContent  = myTotal;
      document.getElementById('opp-total').textContent = oppTotal;
    }

    // ---------- 実数値計算 ----------
    function calcStat(base, iv, ev, lv, natureName, key) {
      const evBonus = Math.floor(ev / 4);
      if (key === 'hp') {
        return Math.floor((base * 2 + iv + evBonus) * lv / 100) + lv + 10;
      } else {
        const raw = Math.floor((base * 2 + iv + evBonus) * lv / 100) + 5;
        const nd = NATURES.find(n => n.name === natureName);
        const mult = nd?.plus === key ? 1.1 : nd?.minus === key ? 0.9 : 1.0;
        return Math.floor(raw * mult);
      }
    }

    function saveIVEV() {
      // DOM上のinput値をJS変数に退避（DOM再生成前に呼ぶ）
      STAT_KEYS.forEach(key => {
        const miv = document.getElementById(`my-iv-${key}`);
        const mev = document.getElementById(`my-ev-${key}`);
        const oiv = document.getElementById(`opp-iv-${key}`);
        const oev = document.getElementById(`opp-ev-${key}`);
        if (miv) myIVs[key]  = Math.min(31,  Math.max(0, parseInt(miv.value) || 0));
        if (mev) myEVs[key]  = Math.min(252, Math.max(0, parseInt(mev.value) || 0));
        if (oiv) oppIVs[key] = Math.min(31,  Math.max(0, parseInt(oiv.value) || 0));
        if (oev) oppEVs[key] = Math.min(252, Math.max(0, parseInt(oev.value) || 0));
      });
    }

    function updateRealStats() {
      if (!myData || !oppData) return;

      saveIVEV(); // 現在のinput値を保存

      const myLv     = Math.min(100, Math.max(1, parseInt(document.getElementById('my-lv').value) || 50));
      const oppLv    = Math.min(100, Math.max(1, parseInt(document.getElementById('opp-lv').value) || 50));
      const myNature = document.getElementById('my-nature').value;
      const oppNature= document.getElementById('opp-nature').value;

      const listEl = document.getElementById('real-stats-list');
      listEl.innerHTML = '';

      let myRealTotal = 0, oppRealTotal = 0;

      STAT_KEYS.forEach(key => {
        const myReal  = calcStat(myData.baseStats[key],  myIVs[key],  myEVs[key],  myLv,  myNature,  key);
        const oppReal = calcStat(oppData.baseStats[key], oppIVs[key], oppEVs[key], oppLv, oppNature, key);
        myRealTotal  += myReal;
        oppRealTotal += oppReal;

        const maxReal = Math.max(myReal, oppReal, 1);
        const myPct   = Math.round(myReal  / maxReal * 100);
        const oppPct  = Math.round(oppReal / maxReal * 100);
        const myColor  = myReal  >= oppReal ? 'bg-blue-500' : 'bg-blue-300';
        const oppColor = oppReal >= myReal  ? 'bg-red-500'  : 'bg-red-300';

        const myNd  = NATURES.find(n => n.name === myNature);
        const oppNd = NATURES.find(n => n.name === oppNature);
        const myNatureTag  = myNd?.plus  === key ? '<span class="text-red-400 font-bold">↑</span>'
                           : myNd?.minus === key ? '<span class="text-blue-400 font-bold">↓</span>' : '';
        const oppNatureTag = oppNd?.plus  === key ? '<span class="text-red-400 font-bold">↑</span>'
                           : oppNd?.minus === key ? '<span class="text-blue-400 font-bold">↓</span>' : '';

        const block = document.createElement('div');
        block.className = 'bg-gray-50 rounded-xl p-3 border border-gray-100';
        block.innerHTML = `
          <div class="text-sm font-bold text-gray-600 mb-2">${STAT_LABELS[key]}</div>
          <div class="grid grid-cols-2 gap-3 mb-2 text-xs">
            <!-- 自分 -->
            <div class="flex items-center gap-2">
              <label class="text-gray-400 shrink-0">個体値</label>
              <input id="my-iv-${key}" type="number" value="${myIVs[key]}" min="0" max="31"
                class="w-12 border rounded px-1 py-0.5 text-xs" oninput="updateRealStats()">
              <label class="text-gray-400 shrink-0">努力値</label>
              <input id="my-ev-${key}" type="number" value="${myEVs[key]}" min="0" max="252"
                class="w-14 border rounded px-1 py-0.5 text-xs" oninput="updateRealStats()">
              <span class="ml-auto text-blue-700 font-bold text-sm">${myReal}${myNatureTag}</span>
            </div>
            <!-- 相手 -->
            <div class="flex items-center gap-2">
              <span class="text-red-700 font-bold text-sm">${oppNatureTag}${oppReal}</span>
              <label class="text-gray-400 shrink-0 ml-auto">個体値</label>
              <input id="opp-iv-${key}" type="number" value="${oppIVs[key]}" min="0" max="31"
                class="w-12 border rounded px-1 py-0.5 text-xs" oninput="updateRealStats()">
              <label class="text-gray-400 shrink-0">努力値</label>
              <input id="opp-ev-${key}" type="number" value="${oppEVs[key]}" min="0" max="252"
                class="w-14 border rounded px-1 py-0.5 text-xs" oninput="updateRealStats()">
            </div>
          </div>
          <!-- 比較バー -->
          <div class="flex items-center gap-2">
            <div class="w-5/12 bg-gray-200 rounded h-4 overflow-hidden flex justify-end">
              <div class="${myColor} h-full rounded-l transition-all" style="width:${myPct}%"></div>
            </div>
            <div class="w-2/12 text-center text-xs text-gray-400">vs</div>
            <div class="w-5/12 bg-gray-200 rounded h-4 overflow-hidden">
              <div class="${oppColor} h-full rounded-r transition-all" style="width:${oppPct}%"></div>
            </div>
          </div>
        `;
        listEl.appendChild(block);
      });

      document.getElementById('my-real-total').textContent  = myRealTotal;
      document.getElementById('opp-real-total').textContent = oppRealTotal;
    }

    // 起動
    init();
  </script>
</body>
</html>
